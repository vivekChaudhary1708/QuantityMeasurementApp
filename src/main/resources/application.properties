################################################################################
# Repository configuration
################################################################################

# Allowed values: CACHE, DATABASE
app.repository.type=DATABASE

################################################################################
# H2 database configuration (used for UC16)
################################################################################

db.driverClassName=org.h2.Driver
db.url=jdbc:h2:~/quantity_measurement;AUTO_SERVER=TRUE
db.username=sa
db.password=

# Connection pool configuration
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.maxIdle=10

################################################################################
# Logging configuration hints (actual behavior driven by Logback)
################################################################################

logging.level.root=INFO
logging.level.com.bridgelabz.quantitymeasurement=DEBUG

